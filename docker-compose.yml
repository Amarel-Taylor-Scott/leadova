services:

  # ── Reverse Proxy ─────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks: [lv-net]

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://leadova:leadova@postgres:5432/leadova
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-development-jwt-secret-do-not-use-in-production
      JWT_EXPIRES_IN: 7d
      PUBLIC_BASE_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks: [lv-net]

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/svelte.config.js:/app/svelte.config.js:ro
    environment:
      PUBLIC_API_URL: http://localhost/api
    restart: unless-stopped
    networks: [lv-net]

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: leadova
      POSTGRES_PASSWORD: leadova
      POSTGRES_DB: leadova
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadova"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [lv-net]

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [lv-net]

networks:
  lv-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  caddy_data:
